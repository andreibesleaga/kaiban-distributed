# Blog Team — Kafka Edition
#
# Local orchestrator (default):
#   docker compose -f examples/blog-team/docker-compose.kafka.yml --env-file .env up -d --build
#   GATEWAY_URL=http://localhost:3000 REDIS_URL=redis://localhost:6379 \
#   MESSAGING_DRIVER=kafka KAFKA_BROKERS=localhost:9092 TOPIC="AI Agents" \
#     npx ts-node examples/blog-team/orchestrator.ts
#
# Fully containerised (--docker mode via blog-team.sh):
#   docker compose -f examples/blog-team/docker-compose.kafka.yml --env-file .env up -d --build
#   docker compose -f examples/blog-team/docker-compose.kafka.yml run --rm orchestrator

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test:
        [
          "CMD",
          "kafka-topics",
          "--bootstrap-server",
          "localhost:9092",
          "--list",
        ]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  gateway:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      MESSAGING_DRIVER: kafka
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: kaiban-gateway
      KAFKA_GROUP_ID: kaiban-group
      PORT: "3000"
      SERVICE_NAME: kaiban-gateway
      AGENT_IDS: gateway
      VALID_HITL_DECISIONS: ${VALID_HITL_DECISIONS:-PUBLISH,REVISE,REJECT,VIEW}
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  researcher:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: ["node", "dist/examples/blog-team/researcher-node.js"]
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      MESSAGING_DRIVER: kafka
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: kaiban-researcher
      KAFKA_GROUP_ID: kaiban-group
      AGENT_ID: researcher
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      SEMANTIC_FIREWALL_ENABLED: ${SEMANTIC_FIREWALL_ENABLED:-false}
      CIRCUIT_BREAKER_ENABLED: ${CIRCUIT_BREAKER_ENABLED:-false}
      JIT_TOKENS_ENABLED: ${JIT_TOKENS_ENABLED:-false}
      CIRCUIT_BREAKER_THRESHOLD: ${CIRCUIT_BREAKER_THRESHOLD:-10}
      CIRCUIT_BREAKER_WINDOW_MS: ${CIRCUIT_BREAKER_WINDOW_MS:-60000}
    restart: on-failure
    # Worker nodes do not expose /health — disable inherited Dockerfile HEALTHCHECK
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  writer:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: ["node", "dist/examples/blog-team/writer-node.js"]
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      MESSAGING_DRIVER: kafka
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: kaiban-writer
      KAFKA_GROUP_ID: kaiban-group
      AGENT_ID: writer
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      SEMANTIC_FIREWALL_ENABLED: ${SEMANTIC_FIREWALL_ENABLED:-false}
      CIRCUIT_BREAKER_ENABLED: ${CIRCUIT_BREAKER_ENABLED:-false}
      JIT_TOKENS_ENABLED: ${JIT_TOKENS_ENABLED:-false}
      CIRCUIT_BREAKER_THRESHOLD: ${CIRCUIT_BREAKER_THRESHOLD:-10}
      CIRCUIT_BREAKER_WINDOW_MS: ${CIRCUIT_BREAKER_WINDOW_MS:-60000}
    restart: on-failure
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  editor:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: ["node", "dist/examples/blog-team/editor-node.js"]
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      MESSAGING_DRIVER: kafka
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: kaiban-editor
      KAFKA_GROUP_ID: kaiban-group
      AGENT_ID: editor
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      SEMANTIC_FIREWALL_ENABLED: ${SEMANTIC_FIREWALL_ENABLED:-false}
      CIRCUIT_BREAKER_ENABLED: ${CIRCUIT_BREAKER_ENABLED:-false}
      JIT_TOKENS_ENABLED: ${JIT_TOKENS_ENABLED:-false}
      CIRCUIT_BREAKER_THRESHOLD: ${CIRCUIT_BREAKER_THRESHOLD:-10}
      CIRCUIT_BREAKER_WINDOW_MS: ${CIRCUIT_BREAKER_WINDOW_MS:-60000}
    restart: on-failure
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ── Orchestrator (--docker mode) ───────────────────────────────────────────
  # Not started automatically. Use: docker compose run --rm orchestrator
  # This gives you an interactive terminal for HITL decisions [1/2/3/4].
  orchestrator:
    profiles: ["cli-only"]
    build:
      context: ../..
      dockerfile: Dockerfile
    command: ["node", "dist/examples/blog-team/orchestrator.js"]
    depends_on:
      gateway:
        condition: service_healthy
    environment:
      # Inside Docker, gateway/redis/kafka are reachable by service name
      GATEWAY_URL: http://gateway:3000
      REDIS_URL: redis://redis:6379
      MESSAGING_DRIVER: kafka
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: kaiban-orchestrator
      KAFKA_GROUP_ID: kaiban-orchestrator-group
      TOPIC: ${TOPIC:-AI Agents in 2025}
      RESEARCH_WAIT_MS: ${RESEARCH_WAIT_MS:-120000}
      WRITE_WAIT_MS: ${WRITE_WAIT_MS:-240000}
      EDIT_WAIT_MS: ${EDIT_WAIT_MS:-300000}
    # stdin_open + tty are required for readline-based HITL interaction
    stdin_open: true
    tty: true
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
