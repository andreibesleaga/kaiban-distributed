image:
  repository: kaiban-distributed
  pullPolicy: IfNotPresent
  # Leave tag empty to use the Chart.AppVersion defined in Chart.yaml.
  # Override at install time: --set image.tag=v1.2.3
  tag: ""

redis:
  enabled: true
  image:
    repository: redis
    tag: 7-alpine

gateway:
  replicas: 1
  port: 3000
  service:
    type: NodePort
    nodePort: 30000

agents:
  researcher:
    replicas: 1
  writer:
    replicas: 1
  editor:
    replicas: 1

config:
  MESSAGING_DRIVER: "bullmq"
  LLM_MODEL: "gpt-4o-mini"

secrets:
  # Base64 encode these values or replace them in production using --set or external secret managers
  OPENAI_API_KEY: ""
  OPENROUTER_API_KEY: ""
