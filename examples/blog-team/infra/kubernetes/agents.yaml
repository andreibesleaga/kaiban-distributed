# Blog Team Agent Deployments
# Apply: kubectl apply -f agents.yaml
# All three agents share the same container image; the command distinguishes their role.

# ── Researcher ──────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kaiban-researcher
  labels:
    app: kaiban-researcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kaiban-researcher
  template:
    metadata:
      labels:
        app: kaiban-researcher
    spec:
      containers:
      - name: researcher
        image: kaiban-distributed:latest
        imagePullPolicy: IfNotPresent
        command: ["node", "dist/examples/blog-team/researcher-node.js"]
        envFrom:
        - configMapRef:
            name: kaiban-blog-team-config
        - secretRef:
            name: kaiban-blog-team-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
---
