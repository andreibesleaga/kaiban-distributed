apiVersion: apps/v1
kind: Deployment
metadata:
  name: kaiban-redis
  labels:
    app: kaiban-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kaiban-redis
  template:
    metadata:
      labels:
        app: kaiban-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        livenessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kaiban-redis
  labels:
    app: kaiban-redis
spec:
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app: kaiban-redis
