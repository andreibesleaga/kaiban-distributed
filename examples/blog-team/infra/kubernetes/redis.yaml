apiVersion: apps/v1
kind: Deployment
metadata:
  name: kaiban-redis
  labels:
    app: kaiban-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kaiban-redis
  template:
    metadata:
      labels:
        app: kaiban-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 2
            periodSeconds: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: kaiban-redis
  labels:
    app: kaiban-redis
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: kaiban-redis
