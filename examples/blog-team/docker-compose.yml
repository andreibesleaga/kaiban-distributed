# Blog Team Multi-Node Demo — BullMQ (default)
#
# Local orchestrator (default):
#   docker compose -f examples/blog-team/docker-compose.yml --env-file .env up -d --build
#   GATEWAY_URL=http://localhost:3000 REDIS_URL=redis://localhost:6379 TOPIC="AI Agents" \
#     npx ts-node examples/blog-team/orchestrator.ts
#
# Fully containerised (--docker mode via blog-team.sh):
#   docker compose -f examples/blog-team/docker-compose.yml --env-file .env up -d --build
#   docker compose -f examples/blog-team/docker-compose.yml run --rm orchestrator

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  gateway:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      MESSAGING_DRIVER: bullmq
      PORT: "3000"
      SERVICE_NAME: kaiban-gateway
      AGENT_IDS: gateway
      VALID_HITL_DECISIONS: ${VALID_HITL_DECISIONS:-PUBLISH,REVISE,REJECT}
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  researcher:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: ["node", "dist/examples/blog-team/researcher-node.js"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      AGENT_ID: researcher
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      SEMANTIC_FIREWALL_ENABLED: ${SEMANTIC_FIREWALL_ENABLED:-false}
      CIRCUIT_BREAKER_ENABLED: ${CIRCUIT_BREAKER_ENABLED:-false}
      JIT_TOKENS_ENABLED: ${JIT_TOKENS_ENABLED:-false}
      CIRCUIT_BREAKER_THRESHOLD: ${CIRCUIT_BREAKER_THRESHOLD:-10}
      CIRCUIT_BREAKER_WINDOW_MS: ${CIRCUIT_BREAKER_WINDOW_MS:-60000}
    restart: on-failure
    # Worker nodes do not expose /health — disable inherited Dockerfile HEALTHCHECK
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  writer:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: ["node", "dist/examples/blog-team/writer-node.js"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      AGENT_ID: writer
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      SEMANTIC_FIREWALL_ENABLED: ${SEMANTIC_FIREWALL_ENABLED:-false}
      CIRCUIT_BREAKER_ENABLED: ${CIRCUIT_BREAKER_ENABLED:-false}
      JIT_TOKENS_ENABLED: ${JIT_TOKENS_ENABLED:-false}
      CIRCUIT_BREAKER_THRESHOLD: ${CIRCUIT_BREAKER_THRESHOLD:-10}
      CIRCUIT_BREAKER_WINDOW_MS: ${CIRCUIT_BREAKER_WINDOW_MS:-60000}
    restart: on-failure
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  editor:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: ["node", "dist/examples/blog-team/editor-node.js"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      AGENT_ID: editor
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      SEMANTIC_FIREWALL_ENABLED: ${SEMANTIC_FIREWALL_ENABLED:-false}
      CIRCUIT_BREAKER_ENABLED: ${CIRCUIT_BREAKER_ENABLED:-false}
      JIT_TOKENS_ENABLED: ${JIT_TOKENS_ENABLED:-false}
      CIRCUIT_BREAKER_THRESHOLD: ${CIRCUIT_BREAKER_THRESHOLD:-10}
      CIRCUIT_BREAKER_WINDOW_MS: ${CIRCUIT_BREAKER_WINDOW_MS:-60000}
    restart: on-failure
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ── Orchestrator (--docker mode) ───────────────────────────────────────────
  # Not started automatically. Use: docker compose run --rm orchestrator
  # This gives you an interactive terminal for HITL decisions [1/2/3/4].
  orchestrator:
    profiles: ["cli-only"]
    build:
      context: ../..
      dockerfile: Dockerfile
    command: ["node", "dist/examples/blog-team/orchestrator.js"]
    depends_on:
      gateway:
        condition: service_healthy
    environment:
      # Inside Docker, gateway is reachable by service name
      GATEWAY_URL: http://gateway:3000
      REDIS_URL: redis://redis:6379
      MESSAGING_DRIVER: bullmq
      TOPIC: ${TOPIC:-AI Agents in 2025}
      RESEARCH_WAIT_MS: ${RESEARCH_WAIT_MS:-120000}
      WRITE_WAIT_MS: ${WRITE_WAIT_MS:-240000}
      EDIT_WAIT_MS: ${EDIT_WAIT_MS:-300000}
    # stdin_open + tty are required for readline-based HITL interaction
    stdin_open: true
    tty: true
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
