# Global Research Swarm — Agent Deployments
# Apply: kubectl apply -f agents.yaml
# All agents share the same image; the command determines their role.
# See configmap.yml for environment config and redis.yml for the message broker.

# ── Searcher ─────────────────────────────────────────────────────────────────
# Fan-out node: run multiple replicas for parallel sub-query execution.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kaiban-research-searcher
  labels:
    app: kaiban-research-searcher
spec:
  replicas: 4  # Default: 4 parallel searchers; overridden by HPA below
  selector:
    matchLabels:
      app: kaiban-research-searcher
  template:
    metadata:
      labels:
        app: kaiban-research-searcher
    spec:
      containers:
      - name: searcher
        image: kaiban-distributed:latest
        imagePullPolicy: IfNotPresent
        command: ["node", "dist/examples/global-research/searcher-node.js"]
        envFrom:
        - configMapRef:
            name: kaiban-research-config
        - secretRef:
            name: kaiban-research-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
---
# HPA: auto-scale searcher fleet based on CPU utilisation
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kaiban-research-searcher-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kaiban-research-searcher
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
