# Editor Agent — Chief Research Editor (HITL gate)
# Final editorial review; triggers human-on-the-loop decision
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kaiban-research-editor
  labels:
    app: kaiban-research-editor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kaiban-research-editor
  template:
    metadata:
      labels:
        app: kaiban-research-editor
    spec:
      containers:
      - name: editor
        image: kaiban-distributed:latest
        imagePullPolicy: IfNotPresent
        command: ["node", "dist/examples/global-research/editor-node.js"]
        envFrom:
        - configMapRef:
            name: kaiban-research-config
        - secretRef:
            name: kaiban-research-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
