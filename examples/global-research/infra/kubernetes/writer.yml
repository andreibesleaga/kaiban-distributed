# Writer Agent — Fan-In aggregation node
# Synthesises all search results into a cohesive research report
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kaiban-research-writer
  labels:
    app: kaiban-research-writer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kaiban-research-writer
  template:
    metadata:
      labels:
        app: kaiban-research-writer
    spec:
      containers:
      - name: writer
        image: kaiban-distributed:latest
        imagePullPolicy: IfNotPresent
        command: ["node", "dist/examples/global-research/writer-node.js"]
        envFrom:
        - configMapRef:
            name: kaiban-research-config
        - secretRef:
            name: kaiban-research-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
