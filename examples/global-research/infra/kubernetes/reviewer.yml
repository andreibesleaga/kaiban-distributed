# Reviewer Agent — AI Ethics & Compliance Officer
# Performs governance review against IEEE AI 7000, EU AI Act, GDPR, OWASP, NIST AI RMF
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kaiban-research-reviewer
  labels:
    app: kaiban-research-reviewer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kaiban-research-reviewer
  template:
    metadata:
      labels:
        app: kaiban-research-reviewer
    spec:
      containers:
      - name: reviewer
        image: kaiban-distributed:latest
        imagePullPolicy: IfNotPresent
        command: ["node", "dist/examples/global-research/reviewer-node.js"]
        envFrom:
        - configMapRef:
            name: kaiban-research-config
        - secretRef:
            name: kaiban-research-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
