apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kaiban-global-research.fullname" . }}-gateway
  labels:
    {{- include "kaiban-global-research.labels" . | nindent 4 }}
    app: {{ include "kaiban-global-research.fullname" . }}-gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      {{- include "kaiban-global-research.selectorLabels" . | nindent 6 }}
      app: {{ include "kaiban-global-research.fullname" . }}-gateway
  template:
    metadata:
      labels:
        {{- include "kaiban-global-research.selectorLabels" . | nindent 8 }}
        app: {{ include "kaiban-global-research.fullname" . }}-gateway
    spec:
      containers:
      - name: gateway
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.gateway.port }}
        envFrom:
        - configMapRef:
            name: {{ include "kaiban-global-research.fullname" . }}-config
        env:
        - name: AGENT_IDS
          value: "gateway"
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.gateway.port }}
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kaiban-global-research.fullname" . }}-gateway
  labels:
    {{- include "kaiban-global-research.labels" . | nindent 4 }}
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
  - port: {{ .Values.gateway.port }}
    targetPort: {{ .Values.gateway.port }}
    {{- if eq .Values.gateway.service.type "NodePort" }}
    nodePort: {{ .Values.gateway.service.nodePort }}
    {{- end }}
  selector:
    {{- include "kaiban-global-research.selectorLabels" . | nindent 4 }}
    app: {{ include "kaiban-global-research.fullname" . }}-gateway
